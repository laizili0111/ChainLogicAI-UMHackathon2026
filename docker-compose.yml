version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chainlogic_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/chainlogic_erp.db:/app/chainlogic_erp.db
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - chainlogic_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chainlogic_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - chainlogic_net

networks:
  chainlogic_net:
    driver: bridge
